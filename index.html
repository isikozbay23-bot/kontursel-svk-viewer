<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e293b">
    <title>Kontur-SEL Sevkiyat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <!--
        SVK_PROXY: Dosya indirme proxy URL'si.
        - LAN test: 'http://192.168.x.x:5555/api/svk-dosya'
        - Cloudflare Worker: 'https://kontursel-dl.xxx.workers.dev'
        - Boş string = dosya indirme devre dışı
    -->
    <script>
        window.SVK_PROXY = '';
    </script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
            </div>
            <span class="header-title">Kontur-SEL</span>
        </div>
    </header>

    <main id="app">
        <!-- Yükleniyor durumu -->
        <div id="state-loading" class="state-view">
            <div class="spinner-wrap">
                <div class="spinner"></div>
                <p>Paket verisi okunuyor…</p>
            </div>
        </div>

        <!-- Hata durumu -->
        <div id="state-error" class="state-view hidden">
            <div class="error-card">
                <div class="error-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <h2>QR Kodu Okunamadı</h2>
                <p id="error-message">Geçersiz veya bozuk QR kodu.</p>
                <p class="error-hint">Lütfen kodu tekrar okutun veya fabrika ile iletişime geçin.</p>
            </div>
        </div>

        <!-- İçerik durumu -->
        <div id="state-content" class="state-view hidden">
            <!-- Paket başlık kartı -->
            <div class="paket-card">
                <div class="paket-ref" id="paket-ref"></div>
                <div class="paket-santiye" id="paket-santiye"></div>
                <div class="paket-meta">
                    <span id="paket-tarih"></span>
                    <span class="meta-sep">·</span>
                    <span id="paket-hazirlayan"></span>
                </div>
                <div class="paket-not" id="paket-not-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <span id="paket-not"></span>
                </div>
                <div class="paket-not" id="paket-not2-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <span id="paket-not2"></span>
                </div>
            </div>

            <!-- Paket fotoğrafları -->
            <div class="foto-section hidden" id="foto-section">
                <div class="foto-container" id="foto-container">
                    <!-- JS tarafından doldurulur -->
                </div>
            </div>

            <!-- Kalem sayısı başlığı -->
            <div class="section-header">
                <h2>Malzeme Listesi</h2>
                <span class="kalem-count" id="kalem-count"></span>
            </div>

            <!-- Malzeme tablosu -->
            <div class="kalem-list" id="kalem-list">
                <!-- JS tarafından doldurulur -->
            </div>

            <!-- Footer -->
            <footer class="site-footer">
                <p>Kontur-SEL Yapı Sistemleri</p>
                <p id="footer-ref"></p>
            </footer>
        </div>
    </main>

    <!-- PIN Modal -->
    <div id="pin-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="pin-modal-title">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="pin-modal-title">Dosya İndirme</h3>
                <button class="modal-close" id="pin-modal-close" aria-label="Kapat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p class="pin-desc">İndirme PIN'ini girin:</p>
                <input id="pin-input" type="number" inputmode="numeric" pattern="[0-9]*"
                       placeholder="● ● ● ●" maxlength="8" autocomplete="off"
                       class="pin-input">
                <p class="pin-error hidden" id="pin-error">Hatalı PIN. Tekrar deneyin.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="pin-cancel">İptal</button>
                <button class="btn-primary" id="pin-confirm">İndir</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
